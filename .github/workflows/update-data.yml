name: Update Football Data

on:
  schedule:
    - cron: "0 */12 * * *"   # every 12 hours
  workflow_dispatch: {}

permissions:
  contents: write

# 🔥 IMPORTANT: يمنع تشغيل جوج runs في نفس الوقت
concurrency:
  group: update-data
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 1. Checkout repo
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Setup Node
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 3. Install dependencies
      - run: npm ci

      # 4. Run pipeline
      - name: Run pipeline
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          THESPORTSDB_KEY: ${{ secrets.THESPORTSDB_KEY }}
        run: npm run build

      # 5. Commit + push safely (NO CONFLICTS)
      - name: Commit updated data
        run: |
          git config user.name "rawantv-bot"
          git config user.email "bot@github.com"

          git add data/

          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi

          git commit -m "chore(data): refresh $(date -u +%Y-%m-%dT%H:%MZ)"

          git push origin main
