name: Update Football Data

on:
  schedule:
    - cron: "0 */12 * * *"   # every 12 hours
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run pipeline
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          THESPORTSDB_KEY:     ${{ secrets.THESPORTSDB_KEY }}
        run: npm run build

      - name: Commit updated data
        run: |
          git config user.name  "rawantv-bot"
          git config user.email "bot@rawantv.local"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "chore(data): refresh $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
